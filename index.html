<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Om Prakash Yadav | Web Tools</title>

<link rel="stylesheet" href="style.css">

<style>
/* PROFILE */
.profile {
  text-align: center;
  margin: 20px;
}
.profile img {
  width: 120px;
  border-radius: 50%;
}

/* COMMENT BOX */
.comment-box {
  padding: 20px;
  text-align: center;
}
.comment-box textarea {
  width: 80%;
  height: 80px;
  margin: 10px;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 20px;
}

/* LOGIN */
#loginBox {
  text-align: center;
  padding: 20px;
}
</style>

</head>

<body>

<header>
  <h1>🚀 Om Pro</h1>
  <p>All Tools + Features</p>
</header>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input type="text" id="user" placeholder="Username"><br><br>
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- MAIN CONTENT -->
<div id="main" style="display:none;">

<!-- PROFILE -->
<div class="profile">
  <img id="profilePic" src="" alt="Profile">
  <h2>Om Prakash Yadav</h2>
</div>

<!-- IMAGE UPLOAD -->
<div style="text-align:center;">
  <input type="file" onchange="loadImage(event)">
</div>

<!-- CAMERA -->
<div style="text-align:center; margin:20px;">
  <video id="video" width="300" autoplay></video><br>
  <button onclick="startCamera()">Start Camera</button>
</div>

<!-- TOOLS -->
<div class="container">

  <div class="card">
    <h3>⏰ Time</h3>
    <button onclick="openPage('page1.html')">Open</button>
  </div>

  <div class="card">
    <h3>🧮 Calculator</h3>
    <button onclick="openPage('page2.html')">Open</button>
  </div>

</div>

<!-- IFRAME -->
<iframe id="frame" width="100%" height="300"></iframe>

<!-- COMMENT -->
<div class="comment-box">
  <h3>💬 Add Comment</h3>
  <textarea id="comment"></textarea><br>
  <button onclick="addComment()">Submit</button>
  <p id="showComment"></p>
</div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Om Prakash Yadav</p>
  <button onclick="changeColor()">Change Background</button>
</footer>

<!-- JS -->
<script>

// LOGIN FUNCTION
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u=="om" && p=="123"){
    document.getElementById("main").style.display="block";
    document.getElementById("loginBox").style.display="none";
  } else {
    document.getElementById("msg").innerHTML="Wrong Login";
  }
}

// IMAGE UPLOAD
function loadImage(event){
  let img = document.getElementById("profilePic");
  img.src = URL.createObjectURL(event.target.files[0]);
}

// CAMERA
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    document.getElementById("video").srcObject = stream;
  });
}

// COMMENT
function addComment(){
  let text = document.getElementById("comment").value;
  document.getElementById("showComment").innerHTML = text;
}

// IFRAME
function openPage(page){
  document.getElementById("frame").src = page;
}

// FOOTER COLOR CHANGE
function changeColor(){
  document.body.style.background = "#" + Math.floor(Math.random()*16777215).toString(16);
}

</script>

</body>
</html>
