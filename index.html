<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Om Pro </title>
  <meta name="google-site-verification" content="SIyi6jhs7rCPfWUsPHfxfEFWW_gHCr5W9z0pE-DpUOo" />
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <h2>🚀 Om Pro</h2>
  <a onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('posts')">Posts</a>
  <a onclick="showSection('table')">Table</a>
  <a onclick="logout()">Logout</a>
</aside>

<!-- MAIN -->
<div id="main">

<header>
  <button onclick="toggleMenu()">☰</button>
  <h2>Dashboard</h2>
  <button onclick="toggleDarkMode()">🌙</button>
</header>

<!-- LOGIN -->
<div id="loginBox" class="center">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<!-- DASHBOARD -->
<section id="dashboard" class="section">
  <div class="cards">
    <div class="card">Users: 120</div>
    <div class="card">Posts: 80</div>
    <div class="card">Likes: 300</div>
  </div>
</section>

<!-- POSTS -->
<section id="posts" class="section">
  <textarea id="postText" placeholder="Write something..."></textarea>
  <input type="file" id="imageUpload"><br><br>
  <button onclick="addPost()">Post</button>
  <input id="search" placeholder="Search..." onkeyup="searchPosts()">
  <div id="postsContainer"></div>
</section>

<!-- TABLE -->
<section id="table" class="section">
  <input id="name" placeholder="Name">
  <button onclick="addRow()">Add</button>

  <table>
    <thead>
      <tr><th>Name</th><th>Action</th></tr>
    </thead>
    <tbody id="tableData"></tbody>
  </table>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
