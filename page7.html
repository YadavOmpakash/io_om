<!DOCTYPE html>
<html>
<body>

<h2>🎨 Change Color</h2>
<button onclick="color()">Change</button>

<a href="index.html">⬅ Back</a>

<script>
function color(){
  document.body.style.background = 
    "rgb("+Math.random()*255+","+Math.random()*255+","+Math.random()*255+")";
}
</script>

</body>
</html>
